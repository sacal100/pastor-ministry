<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사역 관리 시스템 (Ministry Ledger)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <style>
        :root { --pastor-primary: #2c3e50; --pastor-accent: #18bc9c; }
        body { background-color: #f4f7f6; font-family: 'Pretendard', sans-serif; }
        .stat-card { border-radius: 12px; border: none; transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
        .category-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .bg-visitation { background-color: #3498db; } /* 심방 */
        .bg-sermon { background-color: #e67e22; }     /* 설교 */
        .bg-evangelism { background-color: #2ecc71; } /* 전도 */
        .bg-general { background-color: #9b59b6; }    /* 일정 */
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">MMS: Ministry Management System</span>
    </div>
</nav>

<div class="container">
    <div class="row mb-4">
        <div class="col-md-3 mb-3">
            <div class="card stat-card bg-white p-3 shadow-sm">
                <small class="text-muted">이달의 심방</small>
                <h3 id="count-visitation" class="fw-bold">0</h3>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card stat-card bg-white p-3 shadow-sm">
                <small class="text-muted">설교 횟수</small>
                <h3 id="count-sermon" class="fw-bold">0</h3>
            </div>
        </div>
        <div class="col-md-6 mb-3">
            <div class="card stat-card bg-white p-3 shadow-sm" style="height: 100px;">
                <canvas id="ministryChart"></canvas>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <form id="entryForm" class="row g-3">
                <div class="col-md-2">
                    <select id="category" class="form-select">
                        <option value="심방">심방 (Visit)</option>
                        <option value="설교">설교 (Preach)</option>
                        <option value="전도팀">전도 (Evangel)</option>
                        <option value="일정">일정 (Admin)</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <input type="date" id="date" class="form-control" required>
                </div>
                <div class="col-md-5">
                    <input type="text" id="title" class="form-control" placeholder="사역 대상 또는 제목" required>
                </div>
                <div class="col-md-2 d-grid">
                    <button type="submit" class="btn btn-primary">기록</button>
                </div>
                <div class="col-12">
                    <textarea id="note" class="form-control" placeholder="상세 내용 (원어 주해, 기도제목 등)" rows="2"></textarea>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0 fw-bold">사역 명세서</h5>
            <button onclick="exportData()" class="btn btn-sm btn-outline-secondary">데이터 백업</button>
        </div>
        <div class="list-group list-group-flush" id="historyList">
            </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('pastor_ledger')) || [];

    document.getElementById('entryForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const entry = {
            id: Date.now(),
            category: document.getElementById('category').value,
            date: document.getElementById('date').value,
            title: document.getElementById('title').value,
            note: document.getElementById('note').value
        };
        db.push(entry);
        saveAndRender();
        e.target.reset();
    });

    function saveAndRender() {
        localStorage.setItem('pastor_ledger', JSON.stringify(db));
        renderList();
        updateStats();
    }

    function renderList() {
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        db.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(item => {
            let colorClass = '';
            if(item.category === '심방') colorClass = 'bg-visitation';
            else if(item.category === '설교') colorClass = 'bg-sermon';
            else if(item.category === '전도팀') colorClass = 'bg-evangelism';
            else colorClass = 'bg-general';

            list.innerHTML += `
                <div class="list-group-item d-flex justify-content-between align-items-center py-3">
                    <div>
                        <span class="category-dot ${colorClass}"></span>
                        <small class="text-muted">${item.date}</small>
                        <div class="fw-bold mt-1">${item.title}</div>
                        <div class="small text-secondary">${item.note}</div>
                    </div>
                    <button onclick="deleteEntry(${item.id})" class="btn btn-sm text-danger">삭제</button>
                </div>
            `;
        });
    }

    function updateStats() {
        const vCount = db.filter(i => i.category === '심방').length;
        const sCount = db.filter(i => i.category === '설교').length;
        document.getElementById('count-visitation').innerText = vCount;
        document.getElementById('count-sermon').innerText = sCount;
        // [차트 업데이트 로직 생략됨: Chart.js를 이용한 시각화 코드 포함 가능]
    }

    function deleteEntry(id) {
        if(confirm('사역 기록을 삭제하시겠습니까?')) {
            db = db.filter(i => i.id !== id);
            saveAndRender();
        }
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(db)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `ministry_backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
    }

    window.onload = saveAndRender;
</script>
</body>
</html>
